<link rel="stylesheet" href="/assets/css/cooking.css">

<div class="container">
  <h1>Contact</h1>
  <p class="small-muted">General contact page — use the form below to reach out.</p>

  <form method="post" action="mailto:you@example.com" enctype="text/plain" style="max-width:600px;">
    <div class="form-row">
      <label for="contact-name">Name</label>
      <input id="contact-name" name="name" type="text" placeholder="Your name" required>
    </div>

    <div class="form-row">
      <label for="contact-email">Email</label>
      <input id="contact-email" name="email" type="email" placeholder="you@example.com" required>
    </div>

    <div class="form-row">
      <label for="contact-message">Message</label>
      <textarea id="contact-message" name="message" rows="6" placeholder="How can we help?"></textarea>
    </div>

    <button class="button" type="submit">Send</button>
    <p class="small-muted" style="margin-top:10px;">Tip: Replace the mailto action with a proper endpoint or a form provider if you want to collect responses on the server.</p>
  </form>
</div>
